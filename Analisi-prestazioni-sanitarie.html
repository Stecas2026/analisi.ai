            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ricerca ASL/Prestazione</label>
                <input type="text" id="searchInput" placeholder="Digita per cercare..." class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" oninput="updateTable()">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Filtro Regime</label>

            </div>
            <div>

            <div>

            </div>
        </div>

        let currentGroup = 'ALL'; 

        function parseData() {
            const lines = rawData.trim().split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split('\t');
                if (cols.length < 6) continue;
                data.push({
                    provenienza: cols[0],
                    prestazione: cols[1],
                    regione: cols[2],
                    asl: cols[3],
                    q2025: parseInt(cols[4]) || 0,
                    q2026: parseInt(cols[5]) || 0,
                    delta: (parseInt(cols[5]) || 0) - (parseInt(cols[4]) || 0)
                });
            }
            return data;
        }

        const dataStore = parseData();

        function populateFilters() {
            // Regioni
            const regions = [...new Set(dataStore.map(item => item.regione))].sort();
            const regSelect = document.getElementById('regionFilter');
            regSelect.innerHTML = '<option value="ALL">Tutte le Regioni</option>';
            regions.forEach(reg => {
                const opt = document.createElement('option');
                opt.value = reg;
                opt.textContent = reg;
                regSelect.appendChild(opt);
            });
            updateProcedureDropdown();
        }

        function updateProcedureDropdown() {
            const procSelect = document.getElementById('procedureFilter');
            const filteredProcs = dataStore
                .filter(item => {
                    if (currentGroup === 'ALL') return true;
                    return currentGroup === 'PRMA' ? item.prestazione.includes('PRMA') : !item.prestazione.includes('PRMA');
                })
                .map(item => item.prestazione);
            
            const uniqueProcs = [...new Set(filteredProcs)].sort();
            procSelect.innerHTML = '<option value="ALL">Tutte le Prestazioni</option>';
            uniqueProcs.forEach(proc => {
                const opt = document.createElement('option');
                opt.value = proc;
                opt.textContent = proc.length > 70 ? proc.substring(0, 67) + '...' : proc;
                procSelect.appendChild(opt);
            });
        }

        function setGroup(group) {
            currentGroup = group;
            ['btn-prma', 'btn-other', 'btn-all'].forEach(id => {
                document.getElementById(id).classList.remove('tab-active');
                document.getElementById(id).classList.add('text-slate-500');
            });

            const activeId = group === 'PRMA' ? 'btn-prma' : group === 'OTHER' ? 'btn-other' : 'btn-all';
            document.getElementById(activeId).classList.add('tab-active');
            document.getElementById(activeId).classList.remove('text-slate-500');
            
            document.getElementById('procedureFilter').value = 'ALL';
            updateProcedureDropdown();
            updateTable();
        }

        function updateTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const regime = document.getElementById('regimeFilter').value;
            const region = document.getElementById('regionFilter').value;
            const procedure = document.getElementById('procedureFilter').value;
            const tableBody = document.getElementById('tableBody');

            let filtered = dataStore.filter(item => {
                const matchesGroup = (currentGroup === 'ALL') || 
                                   (currentGroup === 'PRMA' ? item.prestazione.includes('PRMA') : !item.prestazione.includes('PRMA'));
                const matchesSearch = item.prestazione.toLowerCase().includes(search) || item.asl.toLowerCase().includes(search);
                const matchesRegime = regime === 'ALL' || item.provenienza === regime;
                const matchesRegion = region === 'ALL' || item.regione === region;
                const matchesProcedure = procedure === 'ALL' || item.prestazione === procedure;
                
                return matchesGroup && matchesSearch && matchesRegime && matchesRegion && matchesProcedure;
            });

            let t25 = 0, t26 = 0;
            filtered.forEach(d => { t25 += d.q2025; t26 += d.q2026; });
            
            document.getElementById('stat-2025').textContent = t25.toLocaleString();
            document.getElementById('stat-2026').textContent = t26.toLocaleString();
            const totalDelta = t26 - t25;
            const deltaEl = document.getElementById('stat-delta');
            deltaEl.textContent = (totalDelta >= 0 ? '+' : '') + totalDelta.toLocaleString();
            deltaEl.className = `text-4xl font-black ${totalDelta > 0 ? 'text-emerald-600' : totalDelta < 0 ? 'text-red-600' : 'text-slate-800'}`;

            document.getElementById('rowCount').textContent = `Righe visualizzate: ${filtered.length}`;

            tableBody.innerHTML = filtered.map(item => `
                <tr class="transition-colors border-b border-slate-50">
                    <td class="px-6 py-4 text-xs font-black ${item.provenienza === 'PsEst' ? 'text-orange-600' : 'text-blue-600'} uppercase">${item.provenienza}</td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-800">${item.regione}</td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-600">${item.asl}</td>
                    <td class="px-6 py-4 text-sm text-slate-500 leading-tight">${item.prestazione}</td>
                    <td class="px-6 py-4 text-sm text-center font-mono font-black text-slate-700">${item.q2025}</td>
                    <td class="px-6 py-4 text-sm text-center font-mono font-black text-slate-800">${item.q2026}</td>
                    <td class="px-6 py-4 text-sm text-center">
                        <span class="${item.delta > 0 ? 'delta-positive' : item.delta < 0 ? 'delta-negative' : 'delta-neutral'}">
                            ${item.delta > 0 ? '+' : ''}${item.delta}
                        </span>
                    </td>
                </tr>
            `).join('');

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-20 text-center text-slate-400 italic font-medium">Nessuna prestazione corrispondente ai filtri impostati</td></tr>`;
            }
        }

        window.onload = () => {
            populateFilters();
            setGroup('ALL'); 
        };
    </script>
